<title>Watch Sabha TV Live Online Streaming </title>

<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;background:#000;color:#eee;font-family:system-ui,sans-serif;-webkit-text-size-adjust:100%}
  .grid{
    display:grid;
    gap:2px;
    padding:2px;
    /* Mobile: always 1 column, hidden tiles simply removed from flow */
    grid-template-columns:1fr;
    grid-auto-rows:auto;
  }
  .tile.hidden{ display:none; }
  .empty-state{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    color:#666;font-size:14px;pointer-events:none;
  }
  .tile{
    position:relative;
    background:#111;
    overflow:hidden;
    aspect-ratio:16/9;
    min-height:0;
    min-width:0;
    border:2px solid transparent;
    transition:border-color 0.2s;
  }
  .tile.active-audio{
    border-color:#0f0;
    box-shadow:0 0 0 2px #0f0 inset;
  }
  /* Tablet/desktop: fit grid exactly to viewport, no scroll */
  @media (min-width:700px){
    html,body{height:100%;overflow:hidden;overscroll-behavior:none}
    .grid{
      gap:4px;padding:4px;
      width:100vw;
      height:100vh;height:100svh;height:100dvh;
      grid-template-columns:repeat(var(--cols,3),1fr);
      grid-template-rows:repeat(var(--rows,3),1fr);
      grid-auto-rows:1fr;
    }
    .tile{aspect-ratio:auto}
  }
  .tile iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

  /* === Collapsible Audio Panel === */
  #audioPanel{
    position:fixed;
    top:12px;
    right:12px;
    z-index:1000;
    background:rgba(20,20,30,0.95);
    border:1px solid #444;
    border-radius:10px;
    padding:8px;
    width:44px;
    max-height:100vh;
    overflow:hidden;
    transition:width 0.25s ease, padding 0.25s ease, max-height 0.25s ease;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  #audioPanel.expanded{
    width:min(280px,95vw);
    padding:10px 12px;
    max-height:min(400px,80vh);
    overflow-y:auto;
  }
  .panel-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    cursor:pointer;
    padding:4px 6px;
    border-radius:6px;
    transition:background 0.15s;
    white-space:nowrap;
  }
  .panel-header:hover{ background:#2a2a3a; }
  .panel-controls{
    display:flex;
    align-items:center;
    gap:4px;
    flex-shrink:0;
  }
  .panel-speaker{
    width:28px;height:28px;
    border-radius:6px;
    background:#0f0;
    color:#000;
    border:none;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:transform 0.15s, background 0.15s;
  }
  .panel-speaker:hover{ transform:scale(1.05); background:#0c0; }
  .panel-minimize{
    width:28px;height:28px;
    border-radius:6px;
    background:#444;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:transform 0.15s, background 0.15s;
    display:none;
  }
  #audioPanel.expanded .panel-minimize{ display:flex; }
  .panel-minimize:hover{ transform:scale(1.05); background:#555; }
  .panel-title{
    font-size:13px;
    color:#0f0;
    font-weight:600;
    display:none;
    flex:1;
  }
  .panel-status{
    font-size:11px;
    color:#888;
    display:none;
  }
  #audioPanel.expanded .panel-title,
  #audioPanel.expanded .panel-status{ display:block; }
  #audioButtons{
    display:none;
    flex-direction:column;
    gap:4px;
    margin-top:4px;
  }
  #audioPanel.expanded #audioButtons{ display:flex; }
  .mute-all-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    padding:8px 10px;
    background:#3a1a1a;
    border:1px solid #c33;
    border-radius:6px;
    color:#fcc;
    cursor:pointer;
    text-align:center;
    transition:all 0.15s;
    font-size:12px;
    font-weight:600;
    margin-bottom:4px;
  }
  .mute-all-btn:hover{ background:#4a2a2a; border-color:#f55; color:#fff; }
  .mute-all-btn .icon{ font-size:14px; }
  .audio-btn{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    padding:6px 10px;
    background:#222;
    border:1px solid #333;
    border-radius:6px;
    color:#ddd;
    cursor:pointer;
    text-align:left;
    transition:all 0.15s;
    font-size:12px;
  }
  .audio-btn:hover{ background:#2a2a3a; border-color:#555; }
  .audio-btn.active{ background:#1a3a1a; border-color:#0f0; color:#0f0; }
  .audio-btn .status{ font-size:16px; min-width:20px; text-align:center; }
  .audio-btn .label{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .audio-btn .index{ color:#888; font-size:11px; min-width:18px; }
  .audio-btn.is-hidden{ opacity:0.5; }
  .audio-btn.is-hidden .label{ text-decoration:line-through; color:#888; }
  .vis-toggle{
    background:transparent;border:none;color:#aaa;cursor:pointer;
    font-size:14px;padding:2px 4px;border-radius:4px;line-height:1;
  }
  .vis-toggle:hover{ background:#333;color:#fff; }
  .panel-actions{
    display:flex;gap:4px;margin-bottom:4px;
  }
  .panel-actions button{
    flex:1;padding:6px 8px;background:#222;border:1px solid #333;border-radius:6px;
    color:#bbb;cursor:pointer;font-size:11px;transition:all 0.15s;
  }
  .panel-actions button:hover{ background:#2a2a3a;border-color:#555;color:#fff; }
  #audioPanel::-webkit-scrollbar{ width:6px; }
  #audioPanel::-webkit-scrollbar-track{ background:#1a1a2a; border-radius:3px; }
  #audioPanel::-webkit-scrollbar-thumb{ background:#444; border-radius:3px; }
  #audioPanel::-webkit-scrollbar-thumb:hover{ background:#555; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>

<!-- Collapsible Audio Control Panel -->
<div id="audioPanel" class="expanded">
  <div class="panel-header" id="panelHeader">
    <span class="panel-title">Audio Focus</span>
    <span class="panel-status" id="panelStatus">All muted</span>
    <div class="panel-controls">
      <button class="panel-minimize" id="panelMinimize" title="Minimize panel">−</button>
      <button class="panel-speaker" id="panelSpeaker" title="Open audio controls">🔊</button>
    </div>
  </div>
  <div id="audioButtons"></div>
</div>

<script>
  const CHANNELS = [
   
    { id: "q3rjwYxwd3M", name: "Sabha TV" },
    
     	// 			 { id: "4Ng7A95vHT0", name: "Amrita News" },
   	    //         	 { id: "nJjUH8uX2o4", name: "Zee News" },
        //              { id: "y52uVr7ads", name: "Real News Kerala" },             
       //  		    { id: "gCNeDWCI0vo", name: "Al Jazeera" }, 
  ];
  const VIDEOS = CHANNELS.map(c => c.id);

  const grid = document.getElementById("grid");
  const audioButtonsContainer = document.getElementById("audioButtons");
  const audioPanel = document.getElementById("audioPanel");
  const panelHeader = document.getElementById("panelHeader");
  const panelSpeaker = document.getElementById("panelSpeaker");
  const panelMinimize = document.getElementById("panelMinimize");
  const panelStatus = document.getElementById("panelStatus");

  const players = [];
  let activeAudioIndex = -1;
  let isPanelExpanded = true;

  // Load YouTube IFrame API
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  // Create tiles and audio buttons
  for (let i = 0; i < VIDEOS.length; i++) {
    const v = VIDEOS[i];
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.id = `tile-${i}`;
    const src = v.startsWith("live_stream")
      ? `https://www.youtube.com/embed/${v}&enablejsapi=1&autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1`
      : `https://www.youtube.com/embed/${v}?enablejsapi=1&autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1`;
    const iframe = document.createElement("iframe");
    iframe.id = `player-${i}`;
    iframe.src = src;
    iframe.title = CHANNELS[i].name;
    iframe.loading = "lazy";
    iframe.referrerPolicy = "strict-origin-when-cross-origin";
    iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
    iframe.allowFullscreen = true;
    tile.appendChild(iframe);
    grid.appendChild(tile);

    const btn = document.createElement("div");
    btn.className = "audio-btn";
    btn.innerHTML = `
      <span class="status">🔇</span>
      <span class="label">${CHANNELS[i].name}</span>
      <span class="index">#${i + 1}</span>
      <button class="vis-toggle" title="Hide/show this video">👁️</button>
    `;
    btn.dataset.index = i;
    btn.addEventListener("click", (e) => {
      if (e.target.classList.contains("vis-toggle")) return;
      e.stopPropagation();
      if (hidden.has(i)) return; // can't focus a hidden video
      setAudioFocus(i);
      if (!isPanelExpanded) expandPanel();
    });
    btn.querySelector(".vis-toggle").addEventListener("click", (e) => {
      e.stopPropagation();
      toggleVisibility(i);
    });
    audioButtonsContainer.appendChild(btn);
  }

  // Show All / Hide All quick actions
  const actions = document.createElement("div");
  actions.className = "panel-actions";
  actions.innerHTML = `<button id="showAllBtn">Show All</button><button id="hideAllBtn">Hide All</button>`;
  audioButtonsContainer.appendChild(actions);
  actions.querySelector("#showAllBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    hidden.clear();
    applyVisibility();
  });
  actions.querySelector("#hideAllBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    for (let i = 0; i < VIDEOS.length; i++) hidden.add(i);
    applyVisibility();
  });

  // Mute All button at top
  const muteAllBtn = document.createElement("button");
  muteAllBtn.className = "mute-all-btn";
  muteAllBtn.innerHTML = `<span class="icon">🔇</span> Mute All`;
  muteAllBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    setAudioFocus(-1);
  });
  audioButtonsContainer.insertBefore(muteAllBtn, audioButtonsContainer.firstChild);

  function expandPanel() {
    if (!isPanelExpanded) {
      isPanelExpanded = true;
      audioPanel.classList.add("expanded");
      panelHeader.title = "Click speaker to minimize";
    }
  }
  function collapsePanel() {
    if (isPanelExpanded) {
      isPanelExpanded = false;
      audioPanel.classList.remove("expanded");
      panelHeader.title = "Click 🔊 to open audio controls";
    }
  }
  function togglePanel() {
    if (isPanelExpanded) collapsePanel(); else expandPanel();
  }

  panelSpeaker.addEventListener("click", (e) => { e.stopPropagation(); expandPanel(); });
  panelMinimize.addEventListener("click", (e) => { e.stopPropagation(); collapsePanel(); });
  panelHeader.addEventListener("click", (e) => {
    if (e.target === panelHeader || e.target.classList.contains("panel-title") || e.target.classList.contains("panel-status")) {
      togglePanel();
    }
  });

  // === Visibility / dynamic grid ===
  const hidden = new Set();

  function computeGridShape(n) {
    // Returns {cols, rows} for n visible tiles
    if (n <= 1) return { cols: 1, rows: 1 };
    if (n === 2) return { cols: 2, rows: 1 };
    if (n <= 4) return { cols: 2, rows: 2 };
    if (n <= 6) return { cols: 3, rows: 2 };
    if (n <= 9) return { cols: 3, rows: 3 };
    if (n <= 12) return { cols: 4, rows: 3 };
    const cols = Math.ceil(Math.sqrt(n));
    return { cols, rows: Math.ceil(n / cols) };
  }

  function applyVisibility() {
    const visibleCount = VIDEOS.length - hidden.size;
    document.querySelectorAll(".tile").forEach((tile, i) => {
      tile.classList.toggle("hidden", hidden.has(i));
    });
    document.querySelectorAll(".audio-btn").forEach((btn, i) => {
      btn.classList.toggle("is-hidden", hidden.has(i));
      const tog = btn.querySelector(".vis-toggle");
      if (tog) tog.textContent = hidden.has(i) ? "🙈" : "👁️";
    });
    const { cols, rows } = computeGridShape(visibleCount);
    grid.style.setProperty("--cols", cols);
    grid.style.setProperty("--rows", rows);

    // If currently focused video got hidden, mute all
    if (activeAudioIndex !== -1 && hidden.has(activeAudioIndex)) {
      setAudioFocus(-1);
    }
    // Pause hidden players to save bandwidth, play visible ones
    players.forEach((player, i) => {
      if (!player?.playVideo) return;
      try {
        if (hidden.has(i)) player.pauseVideo();
        else player.playVideo();
      } catch (_) {}
    });
  }

  function toggleVisibility(i) {
    if (hidden.has(i)) hidden.delete(i); else hidden.add(i);
    applyVisibility();
  }

  function setAudioFocus(index) {
    activeAudioIndex = index;
    document.querySelectorAll(".audio-btn").forEach((btn, i) => {
      const status = btn.querySelector(".status");
      if (i === index) {
        btn.classList.add("active");
        status.textContent = "🔊";
      } else {
        btn.classList.remove("active");
        status.textContent = "🔇";
      }
    });
    document.querySelectorAll(".tile").forEach((tile, i) => {
      tile.classList.toggle("active-audio", i === index);
    });
    panelStatus.textContent = index === -1 ? "All muted" : `Playing: ${CHANNELS[index].name}`;
    players.forEach((player, i) => {
      if (!player?.mute) return;
      if (i === index) { player.unMute(); player.setVolume(100); }
      else { player.mute(); }
    });
  }

  window.onYouTubeIframeAPIReady = function() {
    for (let i = 0; i < VIDEOS.length; i++) {
      new YT.Player(`player-${i}`, {
        events: {
          'onReady': (e) => { players[i] = e.target; e.target.mute(); }
        }
      });
    }
  };

  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    const key = e.key;
    if (/^[1-9]$/.test(key)) {
      const index = parseInt(key) - 1;
      if (index < VIDEOS.length && !hidden.has(index)) {
        e.preventDefault();
        setAudioFocus(index);
        if (!isPanelExpanded) expandPanel();
      }
    }
    if (key === "0" || key.toLowerCase() === "m") { e.preventDefault(); setAudioFocus(-1); }
    if (key === "Escape" && isPanelExpanded) collapsePanel();
  });

  // Initialize muted
  setTimeout(() => setAudioFocus(-1), 2000);
</script>
</body>
</html>
